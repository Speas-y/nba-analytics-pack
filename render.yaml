# 无信用卡时不要用 Render 自带 PostgreSQL（常需绑卡）。请用手动 New Web Service + Docker，
# 并设置 SPRING_PROFILES_ACTIVE=h2（嵌入式数据库，见 spring-backend/application-h2.yml）。
# 若可用外部免费 Postgres（如 Neon 注册后给的连接串），则用 SPRING_PROFILES_ACTIVE=render + DATABASE_URL。
# Vercel：VITE_API_BASE=https://<服务名>.onrender.com/api
version: "1"

services:
  - type: web
    name: nba-analytics-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/public/nba/seasons
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: h2
      - key: FRONTEND_ORIGIN
        value: https://nbasjfx.vercel.app
      - key: CRAWLER_ASYNC
        value: "true"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: CRAWLER_REFRESH_TOKEN
        generateValue: true
